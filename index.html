<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM‑Engineering | Structural Engineering Tools</title>

    <style>
        :root {
            --bg: #f5f5f5;
            --text: #222;
            --card-bg: #ffffff;
            --header-bg: #003366;
            --header-text: #ffffff;
            --placeholder-bg: #e0e0e0;
            --border-color: #ccc;
        }


        body.dark {
            --bg: #1e1e1e;
            --text: #e6e6e6;
            --card-bg: #2a2a2a;
            --header-bg: #001a33;
            --header-text: #ffffff;
            --placeholder-bg: #444;
            --border-color: #555;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
